<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>

        body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 15px;
    background: #f5f5f5;
}

h1, h2 {
    margin-top: 0;
}

.container {
    max-width: 500px;
    margin: auto;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

input, button, select {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

button {
    background: #007bff;
    color: white;
    border: none;
}

button:active {
    opacity: 0.8;
}

.btn-secondary {
    background: #6c757d;
}

.btn-success {
    background: #28a745;
}

.btn-danger {
    background: #dc3545;
}

.nav {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

a {
    text-decoration: none;
    color: #007bff;
}

.autocomplete-container {
    position: relative;
    width: 100%;
}

#resultados {
    position: absolute;
    top: 100%;              /* 🔥 clave */
    left: 0;
    background: white;
    border: 1px solid #ccc;
    width: 100%;
    max-height: 150px;
    overflow-y: auto;
    list-style: none;
    padding: 0;
    margin: 0;
    z-index: 9999;          /* 🔥 importante */
    border-radius: 6px;
}

#resultados li {
    padding: 10px;
    cursor: pointer;
}

#resultados li:hover {
    background-color: #f0f0f0;




}

button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
        }

a.btn-link {
        display: block;
        text-align: center;
        margin-top: 10px;
        padding: 12px;
        border-radius: 8px;
        background: #6c757d;
        color: white;
        text-decoration: none;
    }
</style>
</head>
<div class="container">

<h1>Agregar Reserva</h1>

<form method="post" class="card">
    {% csrf_token %}
    {{ form.non_field_errors }}

    <label>Paciente</label>

    <div class="autocomplete-container">
        <input type="text" id="buscar" placeholder="Buscar paciente...">
        <input type="hidden" name="paciente" id="paciente_id">
        <ul id="resultados"></ul>
    </div>

    <a href="{% url 'crear_paciente' %}">
    <button type="button" class="btn-secondary">
        + Nuevo paciente
    </button>
</a>

    <hr>

    <label>Fecha</label>
    {{ form.fecha }}

    <label>Hora</label>
    {{ form.hora }}

    <label>Duración</label>
    {{ form.duracion }}

    <button type="submit" class="btn-success">
        Guardar reserva
    </button>

</form>

<a href="{% url 'agenda_hoy' %}" class="btn-link" style="display:block; text-align:center; margin-top:10px;">
    ← Volver
</a>

</div>


<script>
const input = document.getElementById("buscar");
const resultados = document.getElementById("resultados");
const pacienteId = document.getElementById("paciente_id");
const mensaje = document.getElementById("mensaje"); // puede no existir

if (input && resultados && pacienteId) {

    input.addEventListener("input", async () => {
        const query = input.value;

        // 🔥 limpiar selección previa
        pacienteId.value = "";

        if (mensaje) {
            mensaje.textContent = "Debes seleccionar un paciente de la lista";
        }

        if (query.length < 2) {
            resultados.innerHTML = "";
            return;
        }

        try {
            const response = await fetch(`/buscar-pacientes/?q=${query}`);

            if (!response.ok) {
                throw new Error("Error en la respuesta del servidor");
            }

            const data = await response.json();

            resultados.innerHTML = "";

            if (data.length === 0) {
                resultados.innerHTML = "<li>No se encontraron pacientes</li>";
                return;
            }

            data.forEach(p => {
                const li = document.createElement("li");
                li.textContent = p.nombre;

                li.onclick = () => {
                    input.value = p.nombre;
                    pacienteId.value = p.id;

                    if (mensaje) {
                        mensaje.textContent = "";
                    }

                    resultados.innerHTML = "";
                };

                resultados.appendChild(li);
            });

        } catch (error) {
            console.error("Error buscando pacientes:", error);
            resultados.innerHTML = "<li>Error al buscar</li>";
        }
    });
}

// 🔥 cerrar dropdown al hacer click fuera
document.addEventListener("click", (e) => {
    if (!e.target.closest(".autocomplete-container")) {
        resultados.innerHTML = "";
    }
});
</script>
