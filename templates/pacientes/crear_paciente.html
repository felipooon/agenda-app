<!DOCTYPE html>
<html>
<head>
    <title>Nuevo Paciente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 15px;
        background: #f5f5f5;
    }

    h1, h2 {
        margin-top: 0;
    }

    .container {
        max-width: 500px;
        margin: auto;
    }

    .card {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, button, select {
        width: 100%;
        padding: 12px;
        margin-top: 8px;
        font-size: 16px;
        border-radius: 8px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }

    button {
        background: #007bff;
        color: white;
        border: none;
    }

    .btn-secondary {
        background: #6c757d;
    }

    .btn-success {
        background: #28a745;
    }

    .errorlist {
        color: red;
        margin: 5px 0;
    }

    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }

    a.btn-link {
        display: block;
        text-align: center;
        margin-top: 10px;
        padding: 12px;
        border-radius: 8px;
        background: #6c757d;
        color: white;
        text-decoration: none;
    }

    .nav {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.nav a {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    background: #6c757d;
    color: white;
    text-decoration: none;
}
    </style>
</head>

<body>

    <div class="nav">
    <a href="{% url 'agenda_hoy' %}" class="btn-secondary">
        📅 Agenda
    </a>
    <a href="{% url 'lista_pacientes' %}" class="btn-secondary">
        👥 Pacientes
    </a>
    <a href="" class="btn-secondary">
        📊 Reportes
    </a>
</div>

<div class="container">

    <h2>Nuevo Paciente</h2>

    <form method="post" class="card">
        {% csrf_token %}

        {{ form.non_field_errors }}

        <label>Nombre</label>
        {{ form.nombre }}

        <label>Teléfono</label>
        {{ form.telefono }}

        <label>Email</label>
        {{ form.email }}

        <label>Notas</label>
        {{ form.notas }}

        <label>Fecha de nacimiento</label>
        {{ form.nacimiento }}

        <button type="submit" class="btn-success">
            Guardar paciente
        </button>
    </form>

    <a href="{% url 'agenda_hoy' %}" class="btn-link">
        ← Volver a Agenda
    </a>

</div>

</body>
</html>
