<!DOCTYPE html>
<html>
<head>
    <title>Nuevo Paciente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; padding: 15px; }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            font-size: 16px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
        }
        .errorlist {
            color: red;
        }
    </style>
</head>
<body>

<h2>Nuevo Paciente</h2>

<form method="post">
    {% csrf_token %}

    {{ form.non_field_errors }}

    <label>Nombre</label>
    {{ form.nombre }}

    <label>Teléfono</label>
    {{ form.telefono }}

    <label>Email</label>
    {{ form.email }}

    <label>Notas</label>
    {{ form.notas }}

    <label>Nacimiento</label>
    {{ form.nacimiento }}

    <button type="submit">Guardar</button>
</form>

<br>
<a href="{% url 'agenda_hoy' %}">← Volver a agenda</a>

</body>
</html>
