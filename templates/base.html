<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Agenda{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background: #f5f5f5;
        }

        h1, h2 {
            margin-top: 0;
        }

        .container {
            max-width: 500px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        input, button, select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
        }

        button:active {
            opacity: 0.8;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-danger {
            background: #dc3545;
        }

        .navbtn {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        a {
            text-decoration: none;
            color: #007bff;
        }

        .estado-asistio {
            background: green;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .estado-no-asistio {
            background: red;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .estado-reservado {
            background: orange;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .card-asistio {
            background-color: #d4edda;
            border-left: 5px solid green;
        }

        .card-no-asistio {
            background-color: #f8d7da;
            border-left: 5px solid red;
        }

        .card-reservado {
            background-color: #fff3cd;
            border-left: 5px solid orange;
        }

        .card-cumple {
            background: #fff3cd;
            border-left: 5px solid orange;
        }

        .nav {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .nav a {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background: #6c757d;
            color: white;
            text-decoration: none;
        }

        a.btn-secondary,
        a.btn-success,
        a.btn-danger {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 8px;
            text-align: center;
            color: white;
            box-sizing: border-box;
            border: none;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- NAV GLOBAL (idéntico al tuyo) -->
    <div class="nav">
        <a href="{% url 'agenda_hoy' %}">📅 Agenda</a>
        <a href="{% url 'lista_pacientes' %}">👥 Pacientes</a>
        <a href="{% url 'reporte_general' %}">📊 Reportes</a>
    </div>

    <!-- CONTENIDO -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
