<!DOCTYPE html>
<html lang="es">

<head>
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Agenda{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- NAV GLOBAL -->
    <div class="nav">
        <a href="{% url 'agenda_hoy' %}">📅 Agenda</a>
        <a href="{% url 'lista_pacientes' %}">👥 Pacientes</a>
        <a href="{% url 'reporte_general' %}">📊 Reportes</a>
    </div>

    <!-- CONTENIDO -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- SCRIPTS -->
    <script src="{% static 'js/autocomplete.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
